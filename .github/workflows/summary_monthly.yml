name: Monthly summary

on:
  schedule:
    - cron: '23 2 1 * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TZ: Asia/Tokyo
  NOTIFY_MODE: 'newly'
  NOTIFY_FROM_TODAY: '1'
  PING_CHANNEL: '1'
  COOLDOWN_MINUTES: '180'
  BONUS_SINGLE_DELTA: '2'
  BONUS_RATIO_THRESHOLD: '0.50'
  ROBOTS_ENFORCE: '1'
  MASK_LEVEL: '1'
  ROLLOVER_HOURS_JSON: '{"Sun":2,"Mon":0,"Tue":5,"Wed":5,"Thu":5,"Fri":6,"Sat":6}'
  UA_CONTACT: 'mailto:example@example.com'

concurrency:
  group: public-safe-state-writer
  cancel-in-progress: false

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Display trigger info
        run: echo "trigger=${{ github.event_name }} ref=${{ github.ref }} sha=${{ github.sha }}"

      - name: Sync masked history
        run: git pull --rebase --autostash origin ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore pip cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Restore Playwright cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers (retry, best-effort)
        continue-on-error: true
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          retry_wait_seconds: 20
          command: python -m playwright install --with-deps chromium

      - name: Webhook疎通テスト
        if: github.event_name == 'workflow_dispatch'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python summarize.py --period monthly --ping-only

      - name: Collect monthly dataset
        env:
          ALLOW_FETCH_FAILURE: ${{ github.event_name == 'schedule' && '1' || '0' }}
        run: python watch_cheeks.py summary --days 30 --raw-output monthly_summary_raw.json --no-notify

      - name: Upload raw monthly summary
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: monthly-summary-raw
          path: monthly_summary_raw.json
          if-no-files-found: ignore
          retention-days: 3

      - name: Generate monthly summary & notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python summarize.py --period monthly --raw-data monthly_summary_raw.json --history history_masked.json --output summary_masked.json

      - name: Commit public-safe archives
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git pull --rebase --autostash origin ${{ github.ref_name }}
          git add monitor_state.json history_masked.json summary_masked.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update monthly summary"
          git push origin HEAD:${{ github.ref_name }}

  notify-failure:
    runs-on: ubuntu-latest
    needs: summary
    if: failure()
    permissions:
      contents: read
    steps:
      - name: Notify Slack on failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{
                \"text\": \"❌ Workflow Failed: Monthly Summary\",
                \"blocks\": [{
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"❌ Workflow Failed\",
                    \"emoji\": false
                  }
                }, {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Workflow:* Monthly Summary\\n*Branch:* \`${{ github.ref_name }}\`\\n*Trigger:* ${{ github.event_name }}\"
                  }
                }, {
                  \"type\": \"actions\",
                  \"elements\": [{
                    \"type\": \"button\",
                    \"text\": {
                      \"type\": \"plain_text\",
                      \"text\": \"View Logs\"
                    },
                    \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                  }]
                }]
              }"
          fi
