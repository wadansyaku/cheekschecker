name: Weekly summary

on:
  schedule:
    - cron: '17 1 * * MON'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TZ: Asia/Tokyo
  NOTIFY_MODE: 'newly'
  NOTIFY_FROM_TODAY: '1'
  PING_CHANNEL: '1'
  COOLDOWN_MINUTES: '180'
  BONUS_SINGLE_DELTA: '2'
  BONUS_RATIO_THRESHOLD: '0.50'
  ROBOTS_ENFORCE: '1'
  MASK_LEVEL: '1'
  ROLLOVER_HOURS_JSON: '{"Sun":2,"Mon":0,"Tue":5,"Wed":5,"Thu":5,"Fri":6,"Sat":6}'
  UA_CONTACT: 'mailto:example@example.com'

concurrency:
  group: public-safe-state-writer
  cancel-in-progress: false

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Display trigger info
        run: echo "trigger=${{ github.event_name }} ref=${{ github.ref }} sha=${{ github.sha }}"

      - name: Sync masked history
        run: git pull --rebase --autostash origin ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore pip cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Restore Playwright cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers (retry, best-effort)
        continue-on-error: true
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          retry_wait_seconds: 20
          command: python -m playwright install --with-deps chromium

      - name: Webhook疎通テスト
        if: github.event_name == 'workflow_dispatch'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python summarize.py --period weekly --ping-only

      - name: Collect weekly dataset
        env:
          ALLOW_FETCH_FAILURE: ${{ github.event_name == 'schedule' && '1' || '0' }}
        run: python watch_cheeks.py summary --days 7 --raw-output weekly_summary_raw.json --no-notify

      - name: Upload raw weekly summary
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: weekly-summary-raw
          path: weekly_summary_raw.json
          if-no-files-found: error
          retention-days: 3

      - name: Generate weekly summary & notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python summarize.py --period weekly --raw-data weekly_summary_raw.json --history history_masked.json --output summary_masked.json

      - name: Commit public-safe archives
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git pull --rebase --autostash origin ${{ github.ref_name }}
          git add monitor_state.json history_masked.json summary_masked.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update weekly summary"
          git push origin HEAD:${{ github.ref_name }}

  notify-failure:
    runs-on: ubuntu-latest
    needs: summary
    if: failure()
    permissions:
      contents: read
    steps:
      - name: Notify Slack on failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORKFLOW_NAME: Weekly Summary
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping failure notification"
            exit 0
          fi
          python - <<'PY' > slack_failure_payload.json
          import json
          import os

          workflow = os.environ.get("WORKFLOW_NAME", "Cheekschecker")
          ref_name = os.environ.get("REF_NAME", "")
          event_name = os.environ.get("EVENT_NAME", "")
          run_url = os.environ.get("RUN_URL", "")
          payload = {
              "text": f"Workflow Failed: {workflow}",
              "blocks": [
                  {
                      "type": "header",
                      "text": {"type": "plain_text", "text": "Workflow Failed", "emoji": False},
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*Workflow:* {workflow}\n*Branch:* `{ref_name}`\n*Trigger:* {event_name}",
                      },
                  },
                  {
                      "type": "actions",
                      "elements": [
                          {
                              "type": "button",
                              "text": {"type": "plain_text", "text": "View Logs"},
                              "url": run_url,
                          }
                      ],
                  },
              ],
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY
          if ! curl --fail-with-body --show-error --silent -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            --data-binary @slack_failure_payload.json; then
            echo "Slack failure notification failed" >&2
          fi
